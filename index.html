    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 10px; padding-bottom: 160px; }
        .container { max-width: 900px; margin: 0 auto; }
        .panel { background: #2a2a2a; padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        select, input { background: #333; color: white; border: 1px solid #444; padding: 10px; border-radius: 5px; margin: 5px 0; width: 100%; box-sizing: border-box; font-size: 16px; }
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; min-width: 80px; font-size: 13px; transition: 0.2s; text-transform: uppercase; }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        .btn-add { background: #4CAF50; } 
        .btn-blue { background: #2196F3; } 
        .btn-red { background: #f44336; }
        .btn-purple { background: #9C27B0; }
        .tier-row { display: flex; background: #333; margin-bottom: 6px; border-radius: 8px; overflow: hidden; min-height: 90px; border: 1px solid #444; }
        .tier-label { width: 85px; display: flex; align-items: center; justify-content: center; font-weight: bold; text-align: center; color: black; font-size: 1.1rem; cursor: pointer; flex-shrink: 0; padding: 5px; word-break: break-word; line-height: 1.1; }
        .tier-items { flex-grow: 1; display: flex; flex-wrap: wrap; padding: 10px; gap: 10px; align-content: flex-start; min-height: 70px; background: #222; }
        .img-item { width: 70px; height: 70px; object-fit: cover; border-radius: 6px; border: 2px solid transparent; cursor: pointer; transition: 0.1s; }
        .img-item.active { border-color: #2196F3; transform: scale(1.15); z-index: 10; box-shadow: 0 0 15px rgba(33, 150, 243, 0.5); }
        #imgMenu { position: fixed; bottom: 0; left: 0; right: 0; background: #2a2a2a; padding: 20px; border-top: 4px solid #2196F3; display: none; z-index: 1000; box-shadow: 0 -5px 25px rgba(0,0,0,0.9); border-radius: 20px 20px 0 0; }
        .menu-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; overflow-y: auto; max-height: 200px; padding-right: 5px; }
        .rank-btn { padding: 10px 5px; border: none; border-radius: 6px; color: black; font-weight: bold; font-size: 12px; cursor: pointer; text-align: center; }
        .unsorted { background: #111; border: 2px dashed #444; border-radius: 12px; margin-top: 25px; padding: 15px; }
        h4 { margin: 0 0 12px 5px; color: #aaa; letter-spacing: 1px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <div style="display:flex; gap:5px">
            <select id="listSelect" onchange="switchList()"></select>
            <button class="btn btn-blue" style="max-width:50px;" onclick="renameCurrentList()">✎</button>
        </div>
        <div class="btn-row">
            <button class="btn btn-blue" onclick="newList()">+ Новый список</button>
            <button class="btn btn-red" onclick="deleteCurrentList()">Удалить всё</button>
        </div>
        <div class="btn-row">
            <button class="btn btn-add" onclick="document.getElementById('fIn').click()">ДОБАВИТЬ ФОТО</button>
            <button class="btn btn-purple" onclick="addTier()">+ РАНГ</button>
        </div>
        <div class="btn-row" style="margin-top:10px">
            <button class="btn" style="background:#444" onclick="exportJSON()">БЭКАП</button>
            <button class="btn" style="background:#444" onclick="document.getElementById('impIn').click()">ИМПОРТ</button>
        </div>
        <input type="file" id="fIn" multiple accept="image/*" style="display:none" onchange="uploadFiles(this.files)">
        <input type="file" id="impIn" accept=".json" style="display:none" onchange="importJSON(this)">
    </div>

    <div id="tierBoard"></div>

    <div class="unsorted">
        <h4>НЕРАСПРЕДЕЛЕННЫЕ:</h4>
        <div class="tier-items" id="unsorted-items"></div>
    </div>
</div>

<div id="imgMenu">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <span id="menuTitle" style="font-weight:bold; color: #bbb;">УПРАВЛЕНИЕ</span>
        <button onclick="closeMenu()" style="background:none; border:none; color:white; font-size:32px; cursor:pointer; line-height: 0.5;">&times;</button>
    </div>
    <div class="btn-row">
        <button class="btn btn-blue" onclick="moveSide('left')">←</button>
        <button class="btn btn-blue" onclick="moveSide('right')">→</button>
        <button class="btn btn-red" onclick="deletePhoto()">УДАЛИТЬ</button>
    </div>
    <div id="rankButtons" class="menu-grid"></div>
</div>

<script>
let db, lists = {}, curId = null, selectedImg = null;

// Инициализация БД
const request = indexedDB.open("SuperTierDB_v3", 1);
request.onupgradeneeded = e => {
    db = e.target.result;
    if (!db.objectStoreNames.contains("data")) db.createObjectStore("data", { keyPath: "id" });
};
request.onsuccess = e => { db = e.target.result; loadData(); };

async function loadData() {
    const tx = db.transaction("data", "readonly");
    const req = tx.objectStore("data").get("main");
    req.onsuccess = () => {
        if (req.result && req.result.content) {
            lists = req.result.content;
            curId = Object.keys(lists)[0];
            updateUI();
        } else { newList("Мой список"); }
    };
}

function save() {
    const tx = db.transaction("data", "readwrite");
    tx.objectStore("data").put({ id: "main", content: lists });
}

function newList(name = null) {
    const title = name || prompt("Название списка:", "Новый список");
    if (!title) return;
    const id = Date.now().toString();
    lists[id] = {
        name: title,
        tiers: [
            { name: 'S', color: '#ff7f7f', items: [] },
            { name: 'A', color: '#ffbf7f', items: [] },
            { name: 'B', color: '#ffdf7f', items: [] },
            { name: 'C', color: '#7fff7f', items: [] }
        ],
        unsorted: []
    };
    curId = id;
    updateUI(); save();
}

function updateUI() {
    const sel = document.getElementById('listSelect');
    sel.innerHTML = '';
    for (let id in lists) {
        const opt = document.createElement('option');
        opt.value = id; opt.textContent = lists[id].name;
        opt.selected = (id === curId);
        sel.appendChild(opt);
    }

    const board = document.getElementById('tierBoard');
    board.innerHTML = '';
    if(!lists[curId]) return;

    lists[curId].tiers.forEach((t, tIdx) => {
        const row = document.createElement('div');
        row.className = 'tier-row';
        row.innerHTML = `<div class="tier-label" style="background:${t.color}" onclick="editTier(${tIdx})">${t.name}</div>
                         <div class="tier-items" id="t-${tIdx}"></div>`;
        board.appendChild(row);
        t.items.forEach((src, iIdx) => renderImg(src, tIdx, iIdx, `t-${tIdx}`));
    });

    const unsortedCont = document.getElementById('unsorted-items');
    unsortedCont.innerHTML = '';
    lists[curId].unsorted.forEach((src, iIdx) => renderImg(src, -1, iIdx, 'unsorted-items'));
}

function renderImg(src, tIdx, iIdx, containerId) {
    const img = document.createElement('img');
    img.src = src; img.className = 'img-item';
    img.onclick = (e) => openMenu(tIdx, iIdx, e);
    document.getElementById(containerId).appendChild(img);
}

function openMenu(tIdx, iIdx, e) {
    selectedImg = { tIdx, iIdx };
    document.querySelectorAll('.img-item').forEach(i => i.classList.remove('active'));
    e.target.classList.add('active');

    const rb = document.getElementById('rankButtons');
    rb.innerHTML = '';
    lists[curId].tiers.forEach((t, idx) => {
        rb.innerHTML += `<button class="rank-btn" style="background:${t.color}" onclick="changeTier(${idx})">${t.name}</button>`;
    });
    rb.innerHTML += `<button class="rank-btn" style="background:#666; color:white;" onclick="changeTier(-1)">UNSORT</button>`;
    document.getElementById('imgMenu').style.display = 'block';
}

function changeTier(newTIdx) {
    const cur = lists[curId];
    let item = (selectedImg.tIdx === -1) 
        ? cur.unsorted.splice(selectedImg.iIdx, 1)[0] 
        : cur.tiers[selectedImg.tIdx].items.splice(selectedImg.iIdx, 1)[0];

    if (newTIdx === -1) cur.unsorted.push(item);
    else cur.tiers[newTIdx].items.push(item);

    closeMenu(); updateUI(); save();
}

function moveSide(dir) {
    const arr = selectedImg.tIdx === -1 ? lists[curId].unsorted : lists[curId].tiers[selectedImg.tIdx].items;
    const i = selectedImg.iIdx;
    if (dir === 'left' && i > 0) [arr[i], arr[i-1]] = [arr[i-1], arr[i]];
    if (dir === 'right' && i < arr.length - 1) [arr[i], arr[i+1]] = [arr[i+1], arr[i]];
    updateUI(); save(); closeMenu();
}

function deletePhoto() {
    if(confirm("Удалить это фото?")) {
        const cur = lists[curId];
        if (selectedImg.tIdx === -1) cur.unsorted.splice(selectedImg.iIdx, 1);
        else cur.tiers[selectedImg.tIdx].items.splice(selectedImg.iIdx, 1);
        closeMenu(); updateUI(); save();
    }
}

function addTier() {
    const n = prompt("Имя ранга:", "New");
    if(!n) return;
    lists[curId].tiers.push({ name: n, color: '#555', items: [] });
    updateUI(); save();
}

function editTier(idx) {
    const t = lists[curId].tiers[idx];
    const act = confirm("ОК - Изменить, ОТМЕНА - Удалить ранг");
    if (act) {
        const n = prompt("Имя:", t.name);
        const c = prompt("Цвет:", t.color);
        if(n) t.name = n; if(c) t.color = c;
    } else if(confirm("Удалить ранг? Фото уйдут в Unsorted")) {
        lists[curId].unsorted.push(...t.items);
        lists[curId].tiers.splice(idx, 1);
    }
    updateUI(); save();
}

function renameCurrentList() {
    const n = prompt("Новое название:", lists[curId].name);
    if(n) { lists[curId].name = n; updateUI(); save(); }
}

function compressImg(file) {
    return new Promise(res => {
        const r = new FileReader();
        r.readAsDataURL(file);
        r.onload = e => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX = 800;
                let w = img.width, h = img.height;
                if (w > MAX || h > MAX) {
                    if (w > h) { h *= MAX / w; w = MAX; } else { w *= MAX / h; h = MAX; }
                }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                res(canvas.toDataURL('image/jpeg', 0.7));
            };
        };
    });
}

async function uploadFiles(files) {
    for (let f of files) {
        const c = await compressImg(f);
        lists[curId].unsorted.push(c);
    }
    updateUI(); save();
}

function switchList() { curId = document.getElementById('listSelect').value; updateUI(); }
function closeMenu() { document.getElementById('imgMenu').style.display = 'none'; }

function deleteCurrentList() {
    if (Object.keys(lists).length <= 1) return alert("Нельзя удалить последний список");
    if (confirm("Удалить весь список?")) {
        delete lists[curId];
        curId = Object.keys(lists)[0];
        updateUI(); save();
    }
}

function exportJSON() {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([JSON.stringify(lists)], {type: "application/json"}));
    a.download = `tierlist-${new Date().toLocaleDateString()}.json`;
    a.click();
}

function importJSON(input) {
    const r = new FileReader();
    r.readAsText(input.files[0]);
    r.onload = e => {
        lists = JSON.parse(e.target.result);
        curId = Object.keys(lists)[0];
        updateUI(); save(); alert("Готово!");
    };
}

// Регистрация простого Service Worker для работы офлайн
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('data:text/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIGZ1bmN0aW9uKGV2ZW50KSB7IH0pOw==');
}
</script>
